# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml
kind: hosted
name: bat-browser-agent
description: |
    Browser automation agent using BATv2Toolbox for session management.
    Creates remote Playwright sessions via Toolbox, connects browser-use CLI,
    and executes browser automation commands.
metadata:
    tags:
        - AI Agent Hosting
        - Responses Protocol
        - Bring Your Own
        - Browser Automation
        - Toolbox
        - Python
protocols:
    - protocol: responses
      version: 1.0.0
resources:
    cpu: "1"
    memory: 2Gi
environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: gpt-4.1
    - name: TOOLBOX_NAME
      value: Mohit-1
    - name: TOOLBOX_VERSION
      value: "8"
