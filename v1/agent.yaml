# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml
kind: hosted
name: async-browser-agent
description: |
    Foundry-hosted async browser automation agent that streams CDP URL for live viewing,
    fetches test-run metadata from Toolbox for form filling, and executes browser commands
    via playwright-cli or browser-use (selected per-prompt).
metadata:
    tags:
        - AI Agent Hosting
        - Responses Protocol
        - Bring Your Own
        - Browser Automation
        - Toolbox
        - Python
protocols:
    - protocol: responses
      version: 1.0.0
resources:
    cpu: "1"
    memory: 2Gi
environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: gpt-4.1
    - name: TOOLBOX_NAME
      value: Mohit-ttoolbox
    - name: TOOLBOX_VERSION
      value: "5"
    - name: AZURE_PLAYWRIGHT_SERVICE_URL
      value: ${AZURE_PLAYWRIGHT_SERVICE_URL}
    - name: AZURE_PLAYWRIGHT_SERVICE_ACCESS_TOKEN
      value: ${AZURE_PLAYWRIGHT_SERVICE_ACCESS_TOKEN}
    - name: BROWSER_CLI_MODE
      value: playwright-cli
