# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml
kind: hosted
name: async-browser-agent
description: |
    A Foundry-hosted async browser automation agent that streams the CDP URL
    for live viewing, then executes browser commands while the user watches.
metadata:
    tags:
        - Browser Automation
        - Azure Playwright Service
        - Streaming
        - CDP Live View
        - Responses Protocol
protocols:
    - protocol: responses
      version: 1.0.0
resources:
    cpu: "1"
    memory: 2Gi
environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
    - name: AZURE_PLAYWRIGHT_SERVICE_URL
      value: ${AZURE_PLAYWRIGHT_SERVICE_URL}
    - name: AZURE_PLAYWRIGHT_SERVICE_ACCESS_TOKEN
      value: ${AZURE_PLAYWRIGHT_SERVICE_ACCESS_TOKEN}
    - name: BROWSER_CLI_MODE
      value: ${BROWSER_CLI_MODE}
    - name: BROWSER_COMMAND_TIMEOUT_SECONDS
      value: ${BROWSER_COMMAND_TIMEOUT_SECONDS}
    - name: BROWSER_MAX_COMMANDS
      value: ${BROWSER_MAX_COMMANDS}
    - name: BROWSER_MAX_OUTPUT_CHARS
      value: ${BROWSER_MAX_OUTPUT_CHARS}
    - name: MCP_TIMEOUT_SECONDS
      value: ${MCP_TIMEOUT_SECONDS}
    - name: TOOLBOX_NAME
      value: ${TOOLBOX_NAME}
