# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: mohit-csharp-sample
description: >
  A C# browser automation agent using MAF with Playwright via Foundry Toolbox.
metadata:
  tags:
    - Agent Framework
    - AI Agent Hosting
    - Responses Protocol
    - Browser Automation
    - C#
template:
  name: mohit-csharp-sample
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
parameters:
  properties:
    - name: PLAYWRIGHT_SERVICE_URL
      secret: false
      description: Browser WebSocket endpoint for the Azure Playwright workspace.
    - name: PLAYWRIGHT_SERVICE_RESOURCE_ID
      secret: false
      description: Azure resource ID of the Playwright workspace.
resources:
  - kind: model
    id: gpt-5.4-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
  - kind: connection
    name: browserautomation
    authType: AgenticIdentityToken
    audience: https://management.core.windows.net
    category: PlaywrightWorkspace
    target: "{{PLAYWRIGHT_SERVICE_URL}}"
    metadata:
      resourceId: "{{PLAYWRIGHT_SERVICE_RESOURCE_ID}}"
  - kind: toolbox
    name: browser-automation-tools
    tools:
      - type: browser_automation_preview
        browser_automation_preview:
          connection:
            project_connection_id: browserautomation
