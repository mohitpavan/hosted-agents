# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: mohit-csharp-bat
services:
    mohit-csharp-sample:
        project: .
        host: azure.ai.agent
        language: docker
        docker:
            remoteBuild: true
        config:
            connections:
                - audience: https://management.core.windows.net
                  authType: AgenticIdentityToken
                  category: PlaywrightWorkspace
                  metadata:
                    resourceId: /subscriptions/9fd9eff4-f386-452e-9893-06417ff6e808/resourceGroups/amit1-rg/providers/Microsoft.LoadTestService/playwrightWorkspaces/pwwkash
                  name: browserautomation
                  target: wss://eastus2euap.api.playwright.microsoft.com/playwrightworkspaces/0990b81e-2566-4c13-afc1-ba5f0e21e301/browsers
            container:
                resources:
                    cpu: "1"
                    memory: 2Gi
            deployments:
                - model:
                    format: OpenAI
                    name: gpt-5.4-mini
                    version: "2026-03-17"
                  name: gpt-5.4-mini
                  sku:
                    capacity: 3500
                    name: GlobalStandard
            toolboxes:
                - name: browser-automation-tools
                  tools:
                    - browser_automation_preview:
                        connection:
                            project_connection_id: browserautomation
                      type: browser_automation_preview
