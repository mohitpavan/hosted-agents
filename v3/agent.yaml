# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: mohit-bat-v3
description: |
    Browser automation agent using raw agentserver-responses hosting,
    playwright-cli for browser commands, Toolbox for session management,
    and a custom skills system for task-specific instructions.
metadata:
    tags:
        - AI Agent Hosting
        - Responses Protocol
        - Bring Your Own
        - Browser Automation
        - Toolbox
        - Python
protocols:
    - protocol: responses
      version: 1.0.0
resources:
    cpu: "1"
    memory: 2Gi
environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: gpt-5.4-mini
    - name: TOOLBOX_ENDPOINT
      value: 'https://mitsha-aif-norway.services.ai.azure.com/api/projects/mohit-bat-proj/toolboxes/Mohit-toolbox/mcp?api-version=v1'
